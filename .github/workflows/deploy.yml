name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  validate:
    name: Validate (build + typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint || true

      - name: Test
        run: npm test

  deploy:
    name: SSH deploy to VPS
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 15m
          script: |
            set -e
            cd /var/www/kartawarta

            # Build lock — prevents two CI runs (or a manual SSH build)
            # from spawning concurrent next-build processes that fight
            # over RAM and create orphan jest-workers.
            LOCK=/tmp/kartawarta-build.lock
            if [ -e "$LOCK" ]; then
              if kill -0 "$(cat $LOCK 2>/dev/null)" 2>/dev/null; then
                echo "Another build (PID $(cat $LOCK)) is already running. Aborting."
                exit 1
              fi
              echo "Stale lock found — removing."
              rm -f "$LOCK"
            fi
            echo $$ > "$LOCK"
            trap 'rm -f "$LOCK"' EXIT

            # Reap orphan next/jest-worker processes from any prior aborted
            # build before we start (they hold open file descriptors on
            # `.next/` and pin RAM).
            pkill -9 -f 'next/dist/build' 2>/dev/null || true
            pkill -9 -f 'jest-worker'      2>/dev/null || true

            pm2 stop kartawarta || true
            sleep 2

            # Drop ANY local file modifications before pulling — hotfixes
            # via scp occasionally leave the working tree dirty.
            git fetch origin master
            git reset --hard origin/master

            rm -rf .next
            npm install --no-audit --no-fund
            npx prisma generate
            # Memory-capped, telemetry-disabled, low-priority build to keep
            # other PM2 apps responsive on a shared ~16GB VPS.
            NODE_OPTIONS='--max-old-space-size=4096' NEXT_TELEMETRY_DISABLED=1 nice -n 10 npm run build

            # Verify build emitted artifacts before restart.
            test -f .next/BUILD_ID || { echo "BUILD_ID missing — build failed silently"; exit 1; }

            pm2 restart kartawarta --update-env
            sleep 3
            pm2 list | grep kartawarta

      - name: Verify production
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sIo /dev/null -w '%{http_code}' https://kartawarta.com)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Production responding: HTTP $STATUS"
              exit 0
            fi
            echo "Waiting for production to come up... (attempt $i, got $STATUS)"
            sleep 5
          done
          echo "❌ Production check failed"
          exit 1
