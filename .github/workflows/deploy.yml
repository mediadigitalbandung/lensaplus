name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  validate:
    name: Validate (build + typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint || true

      - name: Test
        run: npm test

  deploy:
    name: SSH deploy to VPS
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      # ── Step 1: Kick off the build on the VPS as a detached process ──
      # Why: the previous workflow held a single SSH connection open for the
      # full 4–5 minute build, streaming hundreds of KB of warnings through
      # appleboy/ssh-action's Node process. That process repeatedly got OOM/
      # SIGKILL'd by the runner (exit 137). Now SSH closes within ~30s and
      # the build continues under nohup+setsid on the VPS.
      - name: Trigger background deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 1m
          script: |
            set -e
            cd /var/www/kartawarta

            # Pull just the deploy script first so we always run the latest
            # version from master, even if the rest of the working tree is
            # stale (the script itself will git-reset everything else).
            git fetch origin master
            git checkout origin/master -- scripts/deploy-vps.sh
            chmod +x scripts/deploy-vps.sh

            # Detach so SSH can disconnect without killing the build.
            # nohup ignores HUP, setsid breaks the controlling terminal,
            # </dev/null severs stdin, &>file redirects stdio to log.
            nohup setsid bash scripts/deploy-vps.sh \
              > /tmp/kartawarta-deploy.log 2>&1 < /dev/null &
            disown

            # Sanity check that the background process actually launched.
            sleep 1
            pgrep -f scripts/deploy-vps.sh > /dev/null \
              || { echo "deploy-vps.sh failed to start"; cat /tmp/kartawarta-deploy.log; exit 1; }
            echo "deploy-vps.sh running in background"

      # ── Step 2: Poll for completion via short, individual SSH calls ──
      # Each call returns in under a second (just a `cat` of the status
      # file), so the action wrapper never accumulates output and never
      # hits the runner's resource limits. Total wallclock budget: ~14 min.
      - name: Wait for deploy to finish
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        shell: bash
        run: |
          set -u
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > $HOME/.ssh/id_deploy
          chmod 600 $HOME/.ssh/id_deploy
          ssh-keyscan -p 22 -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          SSH_OPTS="-i $HOME/.ssh/id_deploy -o BatchMode=yes -o ConnectTimeout=10 -o ServerAliveInterval=15"

          # Poll for ~14 min (84 × 10s). Build typically finishes in 4–5 min.
          for i in $(seq 1 84); do
            STATUS=$(ssh $SSH_OPTS "$VPS_USER@$VPS_HOST" \
              'cat /tmp/kartawarta-deploy-status 2>/dev/null || echo PENDING' 2>/dev/null \
              || echo SSH_ERR)

            case "$STATUS" in
              OK)
                echo "::notice::Deploy succeeded after ${i} polls"
                ssh $SSH_OPTS "$VPS_USER@$VPS_HOST" \
                  'echo "─── deploy log (last 30 lines) ───"; tail -n 30 /tmp/kartawarta-deploy.log' \
                  || true
                rm -f $HOME/.ssh/id_deploy
                exit 0
                ;;
              FAIL*)
                echo "::error::Deploy failed: $STATUS"
                ssh $SSH_OPTS "$VPS_USER@$VPS_HOST" \
                  'echo "─── deploy log (last 80 lines) ───"; tail -n 80 /tmp/kartawarta-deploy.log' \
                  || true
                rm -f $HOME/.ssh/id_deploy
                exit 1
                ;;
              SSH_ERR)
                # Transient — VPS may be momentarily unreachable. Don't fail.
                echo "ssh transient error on poll ${i}, retrying"
                ;;
              *)
                # Verify the deploy is still alive; if not, fail fast.
                ALIVE=$(ssh $SSH_OPTS "$VPS_USER@$VPS_HOST" \
                  'pgrep -f scripts/deploy-vps.sh > /dev/null && echo YES || echo NO' 2>/dev/null \
                  || echo SSH_ERR)
                if [ "$ALIVE" = "NO" ]; then
                  # Re-check status — the script may have just written it.
                  sleep 1
                  FINAL=$(ssh $SSH_OPTS "$VPS_USER@$VPS_HOST" \
                    'cat /tmp/kartawarta-deploy-status 2>/dev/null || echo MISSING' 2>/dev/null \
                    || echo SSH_ERR)
                  if [ "$FINAL" = "OK" ]; then
                    echo "::notice::Deploy succeeded (caught at exit)"
                    rm -f $HOME/.ssh/id_deploy
                    exit 0
                  fi
                  echo "::error::deploy-vps.sh exited without writing OK status (final='$FINAL')"
                  ssh $SSH_OPTS "$VPS_USER@$VPS_HOST" \
                    'echo "─── deploy log (last 80 lines) ───"; tail -n 80 /tmp/kartawarta-deploy.log' \
                    || true
                  rm -f $HOME/.ssh/id_deploy
                  exit 1
                fi
                echo "poll ${i}: still building..."
                ;;
            esac
            sleep 10
          done

          echo "::error::Deploy timed out after ~14 min"
          ssh $SSH_OPTS "$VPS_USER@$VPS_HOST" \
            'echo "─── deploy log (last 80 lines) ───"; tail -n 80 /tmp/kartawarta-deploy.log' \
            || true
          rm -f $HOME/.ssh/id_deploy
          exit 1

      # ── Step 3: Verify production responds OK ──
      - name: Verify production
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sIo /dev/null -w '%{http_code}' https://kartawarta.com)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Production responding: HTTP $STATUS"
              exit 0
            fi
            echo "Waiting for production to come up... (attempt $i, got $STATUS)"
            sleep 5
          done
          echo "❌ Production check failed"
          exit 1
