name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  validate:
    name: Validate (build + typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint || true

      - name: Test
        run: npm test

  deploy:
    name: SSH deploy to VPS
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      # ── Step 1: Kick off the build on the VPS as a detached process ──
      # Why: the previous workflow held a single SSH connection open for the
      # full 4–5 minute build, streaming hundreds of KB of warnings through
      # appleboy/ssh-action's Node process. That process repeatedly got OOM/
      # SIGKILL'd by the runner (exit 137). Now SSH closes within ~30s and
      # the build continues under nohup+setsid on the VPS.
      - name: Trigger background deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 1m
          # Connection (dial+handshake) timeout. Default is 30s, which is too
          # short when a PRIOR deploy's detached build is still hammering the
          # VPS — sshd can't accept the connect in time and the step fails with
          # "dial tcp :22 i/o timeout", forcing a manual rerun. 4 min lets this
          # attempt simply wait the busy window out and connect once the VPS
          # frees up (the build lock in deploy-vps.sh still prevents overlap).
          timeout: 240s
          script: |
            set -e
            cd /var/www/kartawarta

            # Pull just the deploy script first so we always run the latest
            # version from master, even if the rest of the working tree is
            # stale (the script itself will git-reset everything else).
            git fetch origin master
            git checkout origin/master -- scripts/deploy-vps.sh
            chmod +x scripts/deploy-vps.sh

            # Detach so SSH can disconnect without killing the build.
            # nohup ignores HUP, setsid breaks the controlling terminal,
            # </dev/null severs stdin, &>file redirects stdio to log.
            nohup setsid bash scripts/deploy-vps.sh \
              > /tmp/kartawarta-deploy.log 2>&1 < /dev/null &
            disown

            # Sanity check that the background process actually launched.
            sleep 1
            pgrep -f scripts/deploy-vps.sh > /dev/null \
              || { echo "deploy-vps.sh failed to start"; cat /tmp/kartawarta-deploy.log; exit 1; }
            echo "deploy-vps.sh running in background"

      # ── Step 2: Poll for completion via appleboy/ssh-action ──
      # We loop INSIDE one SSH session. Each iteration only emits a few
      # bytes of `cat` output (PENDING/OK/FAIL), so the cumulative output
      # over the full 14-min budget is well under 1 KB — no OOM risk for
      # the action wrapper, unlike the original synchronous build that
      # streamed hundreds of KB of warnings.
      - name: Wait for deploy to finish
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 15m
          # The build just started on the VPS, so this poll connection can also
          # land during the busy window — give the dial the same long timeout.
          timeout: 240s
          script: |
            STATUS_FILE=/tmp/kartawarta-deploy-status
            LOG_FILE=/tmp/kartawarta-deploy.log

            for i in $(seq 1 84); do
              if [ -f "$STATUS_FILE" ]; then
                STATUS=$(cat "$STATUS_FILE")
                case "$STATUS" in
                  OK)
                    echo "Deploy succeeded after ${i} polls"
                    echo "─── deploy log (last 30 lines) ───"
                    tail -n 30 "$LOG_FILE" || true
                    exit 0
                    ;;
                  FAIL*)
                    echo "Deploy failed: $STATUS"
                    echo "─── deploy log (last 80 lines) ───"
                    tail -n 80 "$LOG_FILE" || true
                    exit 1
                    ;;
                esac
              fi

              # No status file yet — ensure the deploy script is still alive.
              if ! pgrep -f scripts/deploy-vps.sh > /dev/null; then
                # Process gone but no status file means it died unexpectedly.
                # Wait a heartbeat in case status was just written.
                sleep 1
                if [ -f "$STATUS_FILE" ]; then
                  STATUS=$(cat "$STATUS_FILE")
                  if [ "$STATUS" = "OK" ]; then
                    echo "Deploy succeeded (caught at exit)"
                    exit 0
                  fi
                  echo "Deploy failed: $STATUS"
                  echo "─── deploy log (last 80 lines) ───"
                  tail -n 80 "$LOG_FILE" || true
                  exit 1
                fi
                echo "deploy-vps.sh exited without writing status"
                echo "─── deploy log (last 80 lines) ───"
                tail -n 80 "$LOG_FILE" || true
                exit 1
              fi

              # Don't print every iteration — keep cumulative output tiny.
              if [ $((i % 6)) -eq 0 ]; then
                echo "poll ${i}: still building..."
              fi
              sleep 10
            done

            echo "Deploy timed out after ~14 min"
            tail -n 80 "$LOG_FILE" || true
            exit 1

      # ── Step 3: Verify production responds OK ──
      - name: Verify production
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sIo /dev/null -w '%{http_code}' https://kartawarta.com)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Production responding: HTTP $STATUS"
              exit 0
            fi
            echo "Waiting for production to come up... (attempt $i, got $STATUS)"
            sleep 5
          done
          echo "❌ Production check failed"
          exit 1
