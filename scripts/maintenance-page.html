<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <!-- Auto-retry: the deploy is short. Reloading lands back on the live site
       the moment the app is back up (the real app takes over port 3000). -->
  <meta http-equiv="refresh" content="15" />
  <title>Sedang Memperbarui — Lensaplus</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@500;600&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #002045;
      --navy-dark: #001530;
      --crimson: #b7102a;
      --surface: #f8f9fa;
      --text: #191c1d;
      --muted: #74777f;
      --border: #c4c6d0;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--surface);
      color: var(--text);
      font-family: "Work Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: 100%;
      max-width: 460px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0, 32, 69, 0.08);
      padding: 40px 32px;
      text-align: center;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: var(--navy);
      color: #fff;
      font-family: "Newsreader", Georgia, "Times New Roman", serif;
      font-weight: 600;
      font-size: 30px;
      line-height: 1;
      margin-bottom: 20px;
    }
    .brand {
      font-family: "Newsreader", Georgia, "Times New Roman", serif;
      font-weight: 600;
      font-size: 22px;
      letter-spacing: -0.01em;
      color: var(--navy);
      margin: 0 0 4px;
    }
    .brand span { color: var(--crimson); }
    .tagline {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 28px;
    }
    h1 {
      font-family: "Newsreader", Georgia, serif;
      font-weight: 600;
      font-size: 24px;
      line-height: 1.25;
      margin: 0 0 12px;
      color: var(--navy);
    }
    p {
      font-size: 15px;
      line-height: 1.6;
      color: var(--muted);
      margin: 0 auto;
      max-width: 360px;
    }
    .spinner {
      width: 30px;
      height: 30px;
      margin: 28px auto 0;
      border: 3px solid rgba(0, 32, 69, 0.12);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .foot {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
    }
    .foot a { color: var(--navy); text-decoration: none; font-weight: 500; }
    @media (prefers-color-scheme: dark) {
      body { background: #0b1622; color: #e8eaeb; }
      .card { background: #11202f; border-color: rgba(255,255,255,0.08); box-shadow: none; }
      h1, .brand { color: #cfe0f5; }
      .badge { background: #cfe0f5; color: #002045; }
      .foot { border-color: rgba(255,255,255,0.08); }
      .foot a { color: #cfe0f5; }
    }
  </style>
</head>
<body>
  <main class="card" role="status" aria-live="polite">
    <div class="badge">K</div>
    <p class="brand">Karta<span>warta</span></p>
    <p class="tagline">Media Berita Digital Bandung</p>

    <h1>Sebentar, kami sedang berbenah</h1>
    <p>
      Situs sedang memperbarui konten dan sistem. Proses ini hanya berlangsung
      beberapa menit — halaman akan termuat ulang otomatis begitu selesai.
    </p>

    <div class="spinner" aria-hidden="true"></div>

    <div class="foot">
      Butuh bantuan? <a href="mailto:redaksi@lensaplus.com">redaksi@lensaplus.com</a>
    </div>
  </main>

  <script>
    // Belt-and-suspenders on top of <meta refresh>: poll the homepage and
    // reload as soon as the real app answers (status 200, not our 503).
    (function () {
      var DELAY = 8000;
      function check() {
        fetch("/?_mcheck=" + Date.now(), { method: "HEAD", cache: "no-store" })
          .then(function (r) { if (r.status >= 200 && r.status < 400) location.reload(); })
          .catch(function () { /* still down — keep waiting */ })
          .finally(function () { setTimeout(check, DELAY); });
      }
      setTimeout(check, DELAY);
    })();
  </script>
</body>
</html>
